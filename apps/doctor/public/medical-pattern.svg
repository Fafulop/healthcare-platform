<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <g fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.07">

    <!-- Cross 1 -->
    <g transform="translate(65,75)">
      <path d="M-7,-2 H-2 V-7 H2 V-2 H7 V2 H2 V7 H-2 V2 H-7 Z"/>
    </g>

    <!-- Heart 1 -->
    <g transform="translate(215,60) rotate(-10)">
      <path d="M0,7 C-12,0 -12,-8 -6,-8 C-3,-8 0,-5 0,-3 C0,-5 3,-8 6,-8 C12,-8 12,0 0,7 Z"/>
    </g>

    <!-- Stethoscope 1 -->
    <g transform="translate(395,95) rotate(15)">
      <circle cx="0" cy="11" r="5"/>
      <path d="M-4,7 C-4,1 -5,-3 -9,-3 C-13,-3 -13,-9 -9,-11"/>
      <path d="M4,7 C4,1 5,-3 9,-3 C13,-3 13,-9 9,-11"/>
      <circle cx="-9" cy="-12" r="2"/>
      <circle cx="9" cy="-12" r="2"/>
    </g>

    <!-- Pill 1 -->
    <g transform="translate(145,195) rotate(-35)">
      <rect x="-13" y="-5" width="26" height="10" rx="5"/>
      <line x1="0" y1="-5" x2="0" y2="5"/>
    </g>

    <!-- ECG 1 -->
    <g transform="translate(315,190) rotate(5)">
      <polyline points="-25,0 -15,0 -10,-15 -5,12 0,-6 6,0 25,0"/>
    </g>

    <!-- Thermometer 1 -->
    <g transform="translate(290,290) rotate(-15)">
      <rect x="-3" y="-14" width="6" height="18" rx="3"/>
      <circle cx="0" cy="9" r="5"/>
    </g>

    <!-- Cross 2 -->
    <g transform="translate(75,345) rotate(20)">
      <path d="M-7,-2 H-2 V-7 H2 V-2 H7 V2 H2 V7 H-2 V2 H-7 Z"/>
    </g>

    <!-- Heart 2 -->
    <g transform="translate(235,390) rotate(8)">
      <path d="M0,7 C-12,0 -12,-8 -6,-8 C-3,-8 0,-5 0,-3 C0,-5 3,-8 6,-8 C12,-8 12,0 0,7 Z"/>
    </g>

    <!-- Pill 2 -->
    <g transform="translate(420,415) rotate(30)">
      <rect x="-11" y="-4" width="22" height="8" rx="4"/>
      <line x1="0" y1="-4" x2="0" y2="4"/>
    </g>

    <!-- Stethoscope 2 -->
    <g transform="translate(85,470) rotate(-20)">
      <circle cx="0" cy="10" r="4"/>
      <path d="M-3,7 C-3,1 -4,-3 -7,-3 C-11,-3 -11,-7 -8,-9"/>
      <path d="M3,7 C3,1 4,-3 7,-3 C11,-3 11,-7 8,-9"/>
      <circle cx="-8" cy="-10" r="1.5"/>
      <circle cx="8" cy="-10" r="1.5"/>
    </g>

    <!-- Cross 3 -->
    <g transform="translate(350,470) rotate(-5)">
      <path d="M-7,-2 H-2 V-7 H2 V-2 H7 V2 H2 V7 H-2 V2 H-7 Z"/>
    </g>

    <!-- Thermometer 2 -->
    <g transform="translate(175,480) rotate(25)">
      <rect x="-3" y="-12" width="6" height="16" rx="3"/>
      <circle cx="0" cy="8" r="4"/>
    </g>

    <!-- Heart 3 -->
    <g transform="translate(450,170) rotate(-15)">
      <path d="M0,6 C-10,0 -10,-7 -5,-7 C-2,-7 0,-4 0,-3 C0,-4 2,-7 5,-7 C10,-7 10,0 0,6 Z"/>
    </g>

    <!-- ECG 2 -->
    <g transform="translate(185,315) rotate(-5)">
      <polyline points="-22,0 -12,0 -8,-13 -3,10 2,-5 7,0 22,0"/>
    </g>

    <!-- Pill 3 (corner for tiling) -->
    <g transform="translate(30,30) rotate(60)">
      <rect x="-10" y="-4" width="20" height="8" rx="4"/>
      <line x1="0" y1="-4" x2="0" y2="4"/>
    </g>

    <!-- Stethoscope 3 (corner) -->
    <g transform="translate(460,460) rotate(10)">
      <circle cx="0" cy="11" r="5"/>
      <path d="M-4,7 C-4,1 -5,-3 -9,-3 C-13,-3 -13,-9 -9,-11"/>
      <path d="M4,7 C4,1 5,-3 9,-3 C13,-3 13,-9 9,-11"/>
      <circle cx="-9" cy="-12" r="2"/>
      <circle cx="9" cy="-12" r="2"/>
    </g>

  </g>
</svg>
